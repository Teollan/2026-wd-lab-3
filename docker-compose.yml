services:
  postgres:
    image: postgres:17-alpine
    container_name: blogspace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-blogspace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-blogspace}
      POSTGRES_DB: ${POSTGRES_DB:-blogspace}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-blogspace} -d ${POSTGRES_DB:-blogspace}']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
