name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      # TEMP DEBUG: variables are not masked. Remove once resolved.
      # - "repo" must be Teollan/2026-wd-lab-3 (not a fork).
      # - "all visible vars" lists every repo/org var this job can see, by name.
      #   If VITE_API_URL is absent here, it was added as a Secret, or as an
      #   Environment variable (this build job has no `environment:`), or on
      #   the wrong repo, or under a different name.
      - run: |
          echo "repo: ${{ github.repository }}"
          echo "VITE_API_URL is [${{ vars.VITE_API_URL }}]"
          echo "all visible vars: ${{ toJSON(vars) }}"

      - run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
